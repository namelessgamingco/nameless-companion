appId: com.namelessgaming.companion
productName: Nameless Poker
copyright: Copyright © 2025 Nameless Gaming

directories:
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

afterPack: ./scripts/afterPack.js

mac:
  category: public.app-category.utilities
  icon: assets/icon.icns
  target:
    - dmg
    - zip
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: "Connor Woolpert (25W36PNYUT)"
  notarize: true

dmg:
  background: assets/dmg-background.png
  icon: assets/icon.icns
  iconSize: 80
  window:
    width: 660
    height: 400
  contents:
    - x: 180
      y: 200
    - x: 480
      y: 200
      type: link
      path: /Applications

win:
  icon: assets/icon.png
  target:
    - nsis
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

linux:
  icon: assets/icon.png
  target:
    - AppImage
  category: Utility